<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div id="app" class="container mt-5">

        <div class="card p-4 shadow mx-auto" style="max-width:400px;">

            <h3 class="mb-4 text-center">Login</h3>

            <input v-model="auth.username" class="form-control mb-3" placeholder="Username">

            <input v-model="auth.password" type="password" class="form-control mb-3" placeholder="Password">

            <button @click="login" class="btn btn-primary w-100">
                Login
            </button>

            <p class="text-danger mt-3" v-if="authMessage">
                {{ authMessage }}
            </p>

        </div>

    </div>

    <script src="login.js"></script>

</body>

</html>
