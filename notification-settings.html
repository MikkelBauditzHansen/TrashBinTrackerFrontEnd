<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Konfigurer notifikationer</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div id="app" class="container py-5">

    <div v-if="role !== 'Admin'" class="alert alert-danger" id="accessDenied">
        Du har ikke adgang til notifikationsindstillinger.
    </div>

    <div v-if="role === 'Admin'">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 id="pageTitle">
                ⚙️ Konfigurer notifikationer
            </h1>

            <a href="Dashboard.html" class="btn btn-outline-secondary">
                Tilbage
            </a>
        </div>

        <div class="card p-4 shadow-sm">

            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Bruger</th>
                        <th>Fyldningsnotifikationer</th>
                        <th>Temperaturadvarsler</th>
                        <th>Telegram</th>
                    </tr>
                </thead>

                <tbody>
                    <tr v-for="user in users" :key="user.username">

                        <td>
                            <strong>{{ user.username }}</strong>
                            <span v-if="user.role === 'Admin'" class="badge bg-success ms-2">
                                Admin
                            </span>
                        </td>

                        <td>
                            <input type="checkbox"
                                   class="form-check-input"
                                   v-model="user.fillNotifications"
                                   @change="saveSettings(user)">
                        </td>

                        <td>
                            <input type="checkbox"
                                   class="form-check-input"
                                   v-model="user.temperatureNotifications"
                                   @change="saveSettings(user)">
                        </td>

                        <td>
                            <input type="checkbox"
                                   class="form-check-input"
                                   :id="'telegram-' + user.username"
                                   v-model="user.telegramEnabled"
                                   @change="saveSettings(user)">
                        </td>

                    </tr>
                </tbody>
            </table>

            <div v-if="message" class="alert alert-success mt-3">
                {{ message }}
            </div>

        </div>

    </div>

</div>

<script src="notification-settings.js"></script>

</body>
</html>
