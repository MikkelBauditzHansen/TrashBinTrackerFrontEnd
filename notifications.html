<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Notifikationer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div id="app" class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">Notifikationer</h3>

        <a href="index.html" class="btn btn-secondary btn-sm">
            ← Tilbage
        </a>
    </div>

    <div v-if="notifications.length === 0" class="text-muted">
        Ingen notifikationer
    </div>

    <div v-for="n in notifications"
         :key="n.notificationId"
         class="card p-3 mb-2 d-flex flex-row justify-content-between align-items-center">

        <div>
            <div class="fw-semibold">
                {{ n.notificationMessage }}
            </div>

            <small class="text-muted">
                {{ n.trashLevel }}%
            </small>
        </div>

        <button class="btn btn-sm btn-outline-danger"
                @click="markAsRead(n.notificationId)">
            Læst
        </button>

    </div>

</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="notifications.js"></script>

</body>
</html>
