<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historik</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f5f7f9;
            font-family: "Segoe UI", sans-serif;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            background: white;
            border-right: 1px solid #eaeaea;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-item {
            display: block;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            color: #64748b;
            margin-bottom: 6px;
        }

        .menu-item:hover {
            background: #f3f4f6;
        }

        .menu-item.active {
            background: #e8f8ec;
            color: #16a34a;
            font-weight: 600;
        }

        #app {
            margin-left: 250px;
            padding: 30px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #22c55e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div id="app">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div>
            <h4 class="fw-bold">🗑️ Trash Bin Tracker</h4>

            <div class="mt-4">

                <a href="index.html" class="menu-item">
                    🏠 Dashboard
                </a>

                <a href="history.html" class="menu-item active">
                    📊 Historik
                </a>

                <a href="notifications.html" class="menu-item">
                    🔔 Notifikationer
                </a>

            </div>
        </div>

        <div class="d-flex align-items-center gap-2">
            <div class="avatar">
                {{ username ? username.charAt(0).toUpperCase() : 'U' }}
            </div>

            <div>
                <div class="fw-bold">{{ username }}</div>
                <small class="text-muted">Logget ind</small>
            </div>
        </div>

    </div>

    <!-- CONTENT -->
    <div>

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="fw-bold">Tømningshistorik</h2>

            <a href="index.html" class="btn btn-outline-secondary">
                Tilbage
            </a>

        </div>

        <div class="card p-4 shadow-sm">

            <div v-if="history.length === 0">
                Ingen historik fundet.
            </div>

            <div v-for="item in history"
                 :key="item.id"
                 class="border rounded p-3 mb-3">

                <div class="fw-bold">
                    Skraldespand ID: {{ item.trashBinId }}
                </div>

                <small class="text-muted">
                    Tømt: {{ formatDate(item.emptiedAt) }}
                </small>

            </div>

        </div>

    </div>

</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="history.js"></script>

</body>
</html>
