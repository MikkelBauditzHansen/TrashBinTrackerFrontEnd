<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Tømningshistorik</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div id="app" class="container py-5">

    <h3 class="mb-4">Tømningshistorik</h3>

    <a href="index.html" class="btn btn-secondary mb-3">← Tilbage</a>

    <!-- INFO OM SKRALDESPAND -->
    <div v-if="bin" class="mb-4">
        <h5>Skraldespand: {{ bin.name }}</h5>
        <p class="mb-0">
            Lokation: {{ getLocationName(bin.locationId) }} <br>
            Affaldstype: {{ bin.wasteType }}
        </p>
    </div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>#</th>
                <th>Tømt tidspunkt</th>
            </tr>
        </thead>

        <tbody>
            <tr v-for="h in history" :key="h.id">
                <td>{{ h.id }}</td>
                <td>{{ formatDate(h.emptiedAt) }}</td>
            </tr>
        </tbody>
    </table>

</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="History.js"></script>

</body>
</html>
